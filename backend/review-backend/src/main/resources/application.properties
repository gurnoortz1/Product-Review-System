# Server Configuration
server.port=${PORT:8080}
server.address=0.0.0.0

# Database Configuration (H2)
spring.datasource.url=jdbc:h2:file:${APP_DB_PATH:./data/sportsdb}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console
spring.h2.console.enabled=${APP_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# App Configuration
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET:MySuperSecretKeyForSportsShopProject2024WhichIsVeryLongAndSecureEnough!}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# Logging
logging.level.org.springframework.security=INFO
